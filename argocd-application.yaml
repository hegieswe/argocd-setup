apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-environment
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/hegieswe/k8s-manifest.git'
    path: overlays/development
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: test-project
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
